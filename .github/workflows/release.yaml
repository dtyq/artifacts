name: Release Charts

permissions: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - master

jobs:
  release:
    permissions:
      contents: write # chart-releaser: GitHub Releases + gh-pages

    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v4.1.3

      - name: Cache Helm repository index
        uses: actions/cache@v4
        id: helm-repo-cache
        with:
          path: |
            ~/.cache/helm
            ~/.config/helm
          key: helm-repo-${{ runner.os }}-${{ hashFiles('charts/**/Chart.yaml', 'charts/**/Chart.lock', '.github/workflows/release.yaml') }}
          restore-keys: |
            helm-repo-${{ runner.os }}-

      - name: Configure Helm chart repos
        env:
          CACHE_HIT: ${{ steps.helm-repo-cache.outputs.cache-hit }}
        run: |
          if [ "$CACHE_HIT" != "true" ]; then
            helm repo add bitnami https://charts.bitnami.com/bitnami
            helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
            helm repo update
          fi

      - name: Build chart dependencies
        run: |
          for chart in charts/*; do
            if [ -f "${chart}/Chart.yaml" ]; then
              echo "Building dependencies for ${chart}"
              helm dependency build --skip-refresh "${chart}"
            fi
          done

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          config: .cr.yaml
          charts_dir: charts
          skip_existing: true
          mark_as_latest: false
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_GENERATE_RELEASE_NOTES: "true"
