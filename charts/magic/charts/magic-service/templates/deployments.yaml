{{- $global := .Values.global | default dict }}
{{- $extCM := .Values.externalConfigMaps | default dict }}
{{- $extSecret := .Values.externalSecrets | default dict }}
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: web
  name: {{ include "common.names.name" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "magic-service.selectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "magic-service.selectorLabels" . | nindent 8 }}
      {{- with (.Values.podAnnotations | default .Values.global.podAnnotations) }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      containers:
      - env:
        - name: CRONTAB_ENABLE
          value: "false"
        {{- if .Values.extraEnvVars }}
        {{- include "common.tplvalues.render" (dict "value" .Values.extraEnvVars "context" .) | nindent 8 }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ $extCM.redis | default "redis" }}
        - configMapRef:
            name: {{ $extCM.amqp | default "amqp" }}
        - configMapRef:
            name: {{ $extCM.database | default "database" }}
        - configMapRef:
            name: {{ $extCM.fileDriver | default "file-driver" }}
        - configMapRef:
            name: {{ include "common.names.name" . }}
        - secretRef:
            name: {{ $extSecret.redis | default "redis" }}
        - secretRef:
            name: {{ $extSecret.amqp | default "amqp" }}
        - secretRef:
            name: {{ $extSecret.database | default "database" }}
        - secretRef:
            name: {{ $extSecret.fileDriver | default "file-driver" }}
        - secretRef:
            name: {{ include "common.names.name" . }}
        image: {{ include "common.images.image" (dict "imageRoot" .Values.image "global" .Values.global "chart" .Chart) }}
        imagePullPolicy: {{ .Values.image.pullPolicy | default $global.imagePullPolicy | default "Always" | quote }}
        name: {{ include "common.names.name" . }}
        ports:
        - containerPort: 9501
          name: http
          protocol: TCP
        - containerPort: 9502
          name: websocket
          protocol: TCP
        {{- if .Values.customLivenessProbe }}
        livenessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customLivenessProbe "context" $) | nindent 10 }}
        {{- else if .Values.livenessProbe.enabled }}
        livenessProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.livenessProbe "enabled") "context" $) | nindent 10 }}
        {{- end }}
        {{- if .Values.customReadinessProbe }}
        readinessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customReadinessProbe "context" $) | nindent 10 }}
        {{- else if .Values.readinessProbe.enabled }}
        readinessProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.readinessProbe "enabled") "context" $) | nindent 10 }}
        {{- end }}
        {{- if .Values.customStartupProbe }}
        startupProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customStartupProbe "context" $) | nindent 10 }}
        {{- else if .Values.startupProbe.enabled }}
        startupProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.startupProbe "enabled") "context" $) | nindent 10 }}
        {{- end }}
        {{- if .Values.resources }}
        resources: {{- include "common.tplvalues.render" (dict "value" .Values.resources "context" $) | nindent 10 }}
        {{- else if ne (.Values.resourcesPreset | default "small") "none" }}
        resources: {{- include "common.resources.preset" (dict "type" (.Values.resourcesPreset | default "small")) | nindent 10 }}
        {{- end }}
      {{- include "common.images.pullSecrets" (dict "images" (list .Values.image) "global" $global) | nindent 6 }}
      restartPolicy: Always
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app.kubernetes.io/component: daemon
  name: {{ include "common.names.name" . }}-daemon
  namespace: {{ include "common.names.namespace" . | quote }}
spec:
  replicas: {{ .Values.replicaCount | default 1 }}
  selector:
    matchLabels:
      {{- include "magic-service.daemonSelectorLabels" . | nindent 6 }}
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "magic-service.daemonSelectorLabels" . | nindent 8 }}
      {{- with (.Values.podAnnotations | default .Values.global.podAnnotations) }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- $dic := .Values.daemonInitContainer | default dict }}
      {{- if not (eq (toString ($dic.enabled | default true)) "false") }}
      initContainers:
      - name: wait-for-web
        image: {{ include "common.images.image" (dict "imageRoot" ($dic.image | default dict) "global" .Values.global "chart" .Chart) }}
        imagePullPolicy: {{ .Values.image.pullPolicy | default $global.imagePullPolicy | default "Always" | quote }}
        command:
        - sh
        - -c
        - |
          {{- $timeout := $dic.timeoutSeconds | default 300 | int -}}
          {{- $period := $dic.periodSeconds | default 5 | int -}}
          {{- $maxRetries := max 1 (div $timeout $period) }}
          MAX={{ $maxRetries }}
          INTERVAL={{ $period }}
          URL="http://{{ include "common.names.name" . }}.{{ include "common.names.namespace" . }}:9501/heartbeat"
          i=0
          echo "Waiting for $URL (max ${MAX} retries, interval ${INTERVAL}s)..."
          while [ $i -lt $MAX ]; do
            if wget -q -O /dev/null "$URL" 2>/dev/null; then
              echo "Web service is ready after $((i * INTERVAL))s"
              exit 0
            fi
            i=$((i + 1))
            echo "  attempt $i/$MAX failed, retrying in ${INTERVAL}s..."
            sleep $INTERVAL
          done
          echo "Timeout: web service not ready after $((MAX * INTERVAL))s, starting daemon anyway"
          exit 0
      {{- end }}
      containers:
      - env:
        - name: CRONTAB_ENABLE
          value: "true"
        {{- if .Values.extraEnvVars }}
        {{- include "common.tplvalues.render" (dict "value" .Values.extraEnvVars "context" .) | nindent 8 }}
        {{- end }}
        envFrom:
        - configMapRef:
            name: {{ $extCM.redis | default "redis" }}
        - configMapRef:
            name: {{ $extCM.amqp | default "amqp" }}
        - configMapRef:
            name: {{ $extCM.database | default "database" }}
        - configMapRef:
            name: {{ $extCM.fileDriver | default "file-driver" }}
        - configMapRef:
            name: {{ include "common.names.name" . }}
        - secretRef:
            name: {{ $extSecret.redis | default "redis" }}
        - secretRef:
            name: {{ $extSecret.amqp | default "amqp" }}
        - secretRef:
            name: {{ $extSecret.database | default "database" }}
        - secretRef:
            name: {{ $extSecret.fileDriver | default "file-driver" }}
        - secretRef:
            name: {{ include "common.names.name" . }}
        image: {{ include "common.images.image" (dict "imageRoot" .Values.image "global" .Values.global "chart" .Chart) }}
        imagePullPolicy: {{ .Values.image.pullPolicy | default $global.imagePullPolicy | default "Always" | quote }}
        name: {{ include "common.names.name" . }}
        ports:
        - containerPort: 9501
          name: http
          protocol: TCP
        - containerPort: 9502
          name: websocket
          protocol: TCP
        {{- if .Values.customLivenessProbe }}
        livenessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customLivenessProbe "context" $) | nindent 10 }}
        {{- else if .Values.livenessProbe.enabled }}
        livenessProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.livenessProbe "enabled") "context" $) | nindent 10 }}
        {{- end }}
        {{- if .Values.customReadinessProbe }}
        readinessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customReadinessProbe "context" $) | nindent 10 }}
        {{- else if .Values.readinessProbe.enabled }}
        readinessProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.readinessProbe "enabled") "context" $) | nindent 10 }}
        {{- end }}
        {{- if .Values.customStartupProbe }}
        startupProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customStartupProbe "context" $) | nindent 10 }}
        {{- else if .Values.startupProbe.enabled }}
        startupProbe: {{- include "common.tplvalues.render" (dict "value" (omit .Values.startupProbe "enabled") "context" $) | nindent 10 }}
        {{- end }}
        {{- if .Values.resources }}
        resources: {{- include "common.tplvalues.render" (dict "value" .Values.resources "context" $) | nindent 10 }}
        {{- else if ne (.Values.resourcesPreset | default "small") "none" }}
        resources: {{- include "common.resources.preset" (dict "type" (.Values.resourcesPreset | default "small")) | nindent 10 }}
        {{- end }}
      {{- include "common.images.pullSecrets" (dict "images" (list .Values.image) "global" $global) | nindent 6 }}
      restartPolicy: Always
