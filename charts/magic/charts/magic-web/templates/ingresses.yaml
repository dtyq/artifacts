{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  name: {{ include "common.names.name" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
spec:
  ingressClassName: {{ .Values.ingress.ingressClassName | default .Values.global.ingressClassName | default "nginx" }}
  rules:
  - host: {{ include "utils.serviceHost" (dict "service" "magic-web" "default" "www" "context" .) }}
    http:
      paths:
      - backend:
          service:
            name: {{ include "common.names.name" . }}
            port:
              name: http
        path: /
        pathType: ImplementationSpecific
{{- end }}
