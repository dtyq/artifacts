{{- $gateway := .Values.gateway | default dict }}
{{- $magicService := .Values.magicService | default dict }}
{{- $openai := .Values.openai | default dict }}
{{- $claude := .Values.claude | default dict }}
{{- $claudeCache := .Values.claudeCache | default dict }}
{{- $deepseek := .Values.deepseek | default dict }}
{{- $doubao := .Values.doubao | default dict }}
{{- $qwen := .Values.qwen | default dict }}
{{- $gemini := .Values.gemini | default dict }}
{{- $imageGenerator := .Values.imageGenerator | default dict }}
{{- $textToImage := .Values.textToImage | default dict }}
{{- $voiceUnderstanding := .Values.voiceUnderstanding | default dict }}
{{- $bing := .Values.bing | default dict }}
{{- $serpapi := .Values.serpapi | default dict }}
{{- $metaso := .Values.metaso | default dict }}
{{- $amap := .Values.amap | default dict }}
{{- $tikhub := .Values.tikhub | default dict }}
{{- $secretName := include "common.names.fullname" . }}
{{- $magicGatewayApiKey := include "common.secrets.passwords.manage" (dict "secret" $secretName "key" "MAGIC_GATEWAY_API_KEY" "length" 32 "providedValues" (list "gateway.apiKey") "context" $) | trimAll "\"" | b64dec }}
{{- $gpgPrivateKey := include "common.secrets.passwords.manage" (dict "secret" $secretName "key" "GPG_PRIVATE_KEY" "length" 32 "providedValues" (list "gateway.gpgPrivateKey") "context" $) | trimAll "\"" | b64dec }}
{{- $aiDataSigningKey := include "common.secrets.passwords.manage" (dict "secret" $secretName "key" "AI_DATA_SIGNING_KEY" "length" 32 "providedValues" (list "gateway.aiDataSigningKey") "context" $) | trimAll "\"" | b64dec }}

apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
type: Opaque
data:
  MAGIC_GATEWAY_API_KEY: {{ $magicGatewayApiKey | b64enc | quote }}
  MAGIC_API_KEY: {{ $magicService.apiKey | default "" | b64enc | quote }}
  OPENAI_API_KEY: {{ $openai.apiKey | default "" | b64enc | quote }}
  CLAUDE_API_KEY: {{ $claude.apiKey | default "" | b64enc | quote }}
  CLAUDE_CACHE_API_KEY: {{ $claudeCache.apiKey | default "" | b64enc | quote }}
  DEEPSEEK_API_KEY: {{ $deepseek.apiKey | default "" | b64enc | quote }}
  DOUBAO_API_KEY: {{ $doubao.apiKey | default "" | b64enc | quote }}
  QWEN_API_KEY: {{ $qwen.apiKey | default "" | b64enc | quote }}
  GEMINI_API_KEY: {{ $gemini.apiKey | default "" | b64enc | quote }}
  IMAGE_GENERATOR_API_KEY: {{ $imageGenerator.apiKey | default "" | b64enc | quote }}
  TEXT_TO_IMAGE_ACCESS_KEY: {{ $textToImage.accessKey | default "" | b64enc | quote }}
  VOICE_UNDERSTANDING_API_KEY: {{ $voiceUnderstanding.apiKey | default "" | b64enc | quote }}
  BING_SUBSCRIPTION_KEY: {{ $bing.subscriptionKey | default "" | b64enc | quote }}
  SERPAPI_API_KEY: {{ $serpapi.apiKey | default "" | b64enc | quote }}
  METASO_API_KEY: {{ $metaso.apiKey | default "" | b64enc | quote }}
  AMAP_API_KEY: {{ $amap.apiKey | default "" | b64enc | quote }}
  TIKHUB_API_KEY: {{ $tikhub.apiKey | default "" | b64enc | quote }}
  GPG_PRIVATE_KEY: {{ $gpgPrivateKey | b64enc | quote }}
  AI_DATA_SIGNING_KEY: {{ $aiDataSigningKey | b64enc | quote }}
