{{- $app := .Values.app | default dict }}
{{- $agent := .Values.agent | default dict }}
{{- $browser := .Values.browser | default dict }}
{{- $search := .Values.search | default dict }}
{{- $magicGateway := .Values.magicGateway | default dict }}
{{- $magicGatewayBaseUrl := $magicGateway.baseUrl | default "http://magic-gateway" }}
{{- $magicApi := .Values.magicApi | default dict }}
{{- $openai := .Values.openai | default dict }}
{{- $claude := .Values.claude | default dict }}
{{- $deepseek := .Values.deepseek | default dict }}
{{- $doubao := .Values.doubao | default dict }}
{{- $qwen := .Values.qwen | default dict }}
{{- $metaso := .Values.metaso | default dict }}
{{- $textToImage := .Values.textToImage | default dict }}
{{- $qdrant := .Values.qdrant | default dict }}
{{- $storage := .Values.storage | default dict }}
{{- $llm := .Values.llm | default dict }}
{{- $voiceUnderstanding := .Values.voiceUnderstanding | default dict }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: super-magic
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "common.labels.standard" . | nindent 4 }}
    app: super-magic
data:
  APP_ENV: {{ $app.env | default "prod" | quote }}
  LOG_LEVEL: {{ $app.logLevel | default "INFO" | quote }}
  AGENT_ENABLE_MULTI_TOOL_CALLS: {{ $agent.enableMultiToolCalls | default "True" | quote }}
  AGENT_ENABLE_PARALLEL_TOOL_CALLS: {{ $agent.enableParallelToolCalls | default "False" | quote }}
  BROWSER_HEADLESS: {{ $browser.headless | default "True" | quote }}
  BROWSER_STORAGE_STATE_TEMPLATE_URL: {{ $browser.storageStateTemplateUrl | default "" | quote }}
  DEFAULT_SEARCH_ENGINE: {{ $search.defaultEngine | default "bing" | quote }}
  WEB_SEARCH_DEFAULT_ENGINE: {{ $search.webDefaultEngine | default "magic" | quote }}
  IMAGE_SEARCH_DEFAULT_ENGINE: {{ $search.imageDefaultEngine | default "bing" | quote }}
  MAGIC_GATEWAY_BASE_URL: {{ $magicGatewayBaseUrl | quote }}
  MAGIC_API_BASE_URL: {{ $magicGatewayBaseUrl }}/MAGIC_API_BASE_URL
  MAGIC_API_KEY: MAGIC_API_KEY
  MAGIC_API_SERVICE_BASE_URL: {{ $magicGatewayBaseUrl }}/MAGIC_API_SERVICE_BASE_URL
  OPENAI_API_BASE_URL: {{ $magicGatewayBaseUrl }}/OPENAI_API_BASE_URL
  OPENAI_API_KEY: OPENAI_API_KEY
  OPENAI_MODEL: {{ $openai.model | default "gpt-4o" | quote }}
  OPENAI_4_1_MODEL: {{ $openai.model41 | default "gpt-4.1" | quote }}
  OPENAI_4_1_MINI_MODEL: {{ $openai.model41Mini | default "gpt-4.1-mini" | quote }}
  OPENAI_4_1_NANO_MODEL: {{ $openai.model41Nano | default "gpt-4.1-nano" | quote }}
  CLAUDE_API_BASE_URL: {{ $magicGatewayBaseUrl }}/CLAUDE_API_BASE_URL
  CLAUDE_API_KEY: CLAUDE_API_KEY
  CLAUDE_MODEL: {{ $claude.model | default "claude-3.7" | quote }}
  CLAUDE_CACHE_API_BASE_URL: {{ $magicGatewayBaseUrl }}/CLAUDE_CACHE_API_BASE_URL
  CLAUDE_CACHE_API_KEY: CLAUDE_CACHE_API_KEY
  CLAUDE_CACHE_MODEL: {{ $claude.cacheModel | default "claude-3.7" | quote }}
  DEEPSEEK_API_BASE_URL: {{ $magicGatewayBaseUrl }}/DEEPSEEK_API_BASE_URL
  DEEPSEEK_API_KEY: DEEPSEEK_API_KEY
  DEEPSEEK_MODEL: {{ $deepseek.model | default "deepseek-v3" | quote }}
  DEEPSEEK_REASONER_MODEL: {{ $deepseek.reasonerModel | default "deepseek-r1" | quote }}
  DOUBAO_API_BASE_URL: {{ $magicGatewayBaseUrl }}/DOUBAO_API_BASE_URL
  DOUBAO_API_KEY: DOUBAO_API_KEY
  DOUBAO_1_5_PRO_32K_MODEL: {{ $doubao.pro32kModel | default "doubao-1.5-pro-32k" | quote }}
  DOUBAO_1_5_PRO_256K_MODEL: {{ $doubao.pro256kModel | default "doubao-1.5-pro-256k" | quote }}
  DOUBAO_1_5_VISION_PRO_32K_MODEL: {{ $doubao.visionPro32kModel | default "doubao-1.5-vision-pro-32k" | quote }}
  QWEN_API_BASE_URL: {{ $magicGatewayBaseUrl }}/QWEN_API_BASE_URL
  QWEN_API_KEY: QWEN_API_KEY
  QWEN_MODEL: {{ $qwen.model | default "qwen-max" | quote }}
  QWEN_PLUS_MODEL: {{ $qwen.plusModel | default "qwen-plus" | quote }}
  QWEN_TURBO_MODEL: {{ $qwen.turboModel | default "qwen-turbo" | quote }}
  QWEN_LONG_MODEL: {{ $qwen.longModel | default "qwen-long" | quote }}
  QWEN3_CODER_PLUS_MODEL: {{ $qwen.qwen3CoderPlusModel | default "qwen3-coder-plus" | quote }}
  QWQ_PLUS_MODEL: {{ $qwen.qwqPlusModel | default "qwq-plus" | quote }}
  BING_SUBSCRIPTION_ENDPOINT: {{ $magicGatewayBaseUrl }}/BING_SUBSCRIPTION_ENDPOINT
  BING_SUBSCRIPTION_KEY: BING_SUBSCRIPTION_KEY
  SERPAPI_API_ENDPOINT: {{ $magicGatewayBaseUrl }}/SERPAPI_API_ENDPOINT
  SERPAPI_API_KEY: SERPAPI_API_KEY
  METASO_API_ENDPOINT: {{ $magicGatewayBaseUrl }}/METASO_API_ENDPOINT
  METASO_API_KEY: METASO_API_KEY
  METASO_SEARCH_ENDPOINT: {{ $metaso.searchEndpoint | default "/api/v1/search" | quote }}
  IMAGE_GENERATOR_API_URL: {{ $magicGatewayBaseUrl }}/IMAGE_GENERATOR_API_URL
  IMAGE_GENERATOR_API_KEY: IMAGE_GENERATOR_API_KEY
  TEXT_TO_IMAGE_API_BASE_URL: {{ $magicGatewayBaseUrl }}/TEXT_TO_IMAGE_API_BASE_URL
  TEXT_TO_IMAGE_ACCESS_KEY: TEXT_TO_IMAGE_ACCESS_KEY
  TEXT_TO_IMAGE_PLATFORM: {{ $textToImage.platform | default "magic-service" | quote }}
  VOICE_UNDERSTANDING_API_BASE_URL: {{ $magicGatewayBaseUrl }}/VOICE_UNDERSTANDING_API_BASE_URL
  VOICE_UNDERSTANDING_API_KEY: VOICE_UNDERSTANDING_API_KEY
  QDRANT_COLLECTION_PREFIX: {{ $qdrant.collectionPrefix | default "SUPERMAGIC-" | quote }}
  MAGIC_EMBEDDING_MODEL: {{ $qdrant.embeddingModel | default "text-embedding-3-large" | quote }}
  STORAGE_USE_INTERNAL_ENDPOINT: {{ $storage.useInternalEndpoint | default "True" | quote }}
  LLM_CUSTOM_API_HEADERS: {{ $llm.customApiHeaders | default (dict "X-KBYS-YRNTYRBGT" "super-magic") | toJson | quote }}
  TIKHUB_API_KEY: TIKHUB_API_KEY
