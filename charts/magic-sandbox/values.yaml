namespace: "magic-sandbox"

magic-gateway:
  enabled: true
  image:
    registry: ""
    repository: dtyq/magic-gateway
    tag: "master"
    pullPolicy: Always
  replicaCount: 1
  fullnameOverride: "magic-gateway"

sandbox-gateway:
  enabled: true
  image:
    registry: ""
    repository: dtyq/sandbox-components
    tag: "master"
    pullPolicy: Always
  replicaCount: 1
  fullnameOverride: "sandbox-gateway"

  ingress:
    enabled: false
    className: nginx
    hosts:
      - host: sandbox-gateway.magic.local
        paths:
          - path: /
            pathType: Prefix

  agent:
    image:
      registry: ""
      repository: dtyq/super-magic
      tag: "master"
    port: "8002"

  playwright:
    image:
      repository: dtyq/playwright-mod
      tag: "master"

  fuse:
    image:
      registry: ""
      repository: dtyq/s3fs-fuse-mod
      tag: "master"

imagePrepull:
  enabled: true
  # waitPolicy is consumed by magicrew-cli deploy logic:
  # - none: do not wait
  # - scheduled: wait briefly until PodScheduled
  # - ready: wait until pods become Ready (may take longer)
  waitPolicy: ready
  maxWaitSeconds: 300
  # Rolling update knobs for repeat deploys.
  maxUnavailable: 1
  nodeSelector: {}
  tolerations: []
  affinity: {}
