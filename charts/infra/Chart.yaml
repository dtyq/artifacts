apiVersion: v2
name: infra
description: Infrastructure chart for Magic
type: application
version: 0.0.1
appVersion: "0.0.1"

dependencies:
  - name: mysql
    version: "10.3.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: mysql.enabled
  - name: redis
    version: "19.6.4"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: rabbitmq
    version: "14.7.0"
    repository: "https://charts.bitnami.com/bitnami"
    condition: rabbitmq.enabled
  - name: minio
    version: "17.0.21"
    repository: "https://charts.bitnami.com/bitnami"
    condition: minio.enabled
  - name: ingress-nginx
    version: "4.13.2"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx.enabled

maintainers:
  - name: "Lighthouse Engine Ops Team"
    email: "ops@dtyq.com"
