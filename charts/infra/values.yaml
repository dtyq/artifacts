global:
  security:
    allowInsecureImages: true

mysql:
  enabled: true
  auth:
    createDatabase: false
  image:
    repository: bitnamilegacy/mysql
    tag: 8.0.38-debian-12-r3
  volumePermissions:
    enabled: true
    image:
      repository: bitnamilegacy/os-shell
  primary:
    enabled: true
    extraFlags: "--max_connections=500"
    databaseInitContainer:
      enabled: false
    resources:
      requests:
        cpu: "50m"
        memory: "512Mi"
    persistence:
      enabled: true

redis:
  enabled: true
  architecture: standalone
  image:
    repository: bitnamilegacy/redis
  auth:
    enabled: true
  master:
    persistence:
      enabled: true
  volumePermissions:
    enabled: true
    image:
      repository: bitnamilegacy/os-shell

rabbitmq:
  enabled: true
  image:
    repository: bitnamilegacy/rabbitmq
  volumePermissions:
    enabled: true
    image:
      repository: bitnamilegacy/os-shell
  auth:
    username: "admin"
  extraPlugins: "rabbitmq_auth_backend_ldap delayed_message_exchange"
  resources:
    requests:
      cpu: 50m
      memory: 512Mi
  persistence:
    enabled: true

minio:
  enabled: true
  image:
    repository: bitnamilegacy/minio
  auth:
    rootUser: "magic_minio_admin"
  resources:
    requests:
      cpu: "50m"
      memory: "256Mi"
  defaultBuckets: "magic,magic-public,magic-sandbox"
  persistence:
    mountPath: /data/minio/
  ingress:
    enabled: false
  service:
    type: NodePort
    nodePorts:
      api: 32090

  provisioning:
    enabled: true

  console:
    enabled: false
  defaultInitContainers:
    volumePermissions:
      enabled: true
      image:
        repository: bitnamilegacy/os-shell

ingress-nginx:
  enabled: true
  controller:
    image:
      image: ingress-nginx/controller
      tag: v1.13.2
    service:
      enabled: true
      type: NodePort
      nodePorts:
        http: 32080
        https: 32443
    admissionWebhooks:
      patch:
        image:
          image: ingress-nginx/kube-webhook-certgen
          tag: v1.6.2
